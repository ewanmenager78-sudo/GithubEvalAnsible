---
- name: Installation de WordPress
  hosts: all
  become: yes
  tasks:
    - name: Mise à jour du cache apt et installation des paquets
      apt:
        name:
          - apache2
          - php
          - libapache2-mod-php
          - php-mysql
          - mariadb-server
          - wget
          - unzip
        state: present
        update_cache: yes

    - name: Suppression de l'index par défaut
      file:
        path: /var/www/html/index.html
        state: absent

    - name: Création de la base de données MariaDB
      mysql_db:
        name: wordpress
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Création de l'utilisateur MariaDB
      mysql_user:
        name: example
        password: examplePW
        priv: 'wordpress.*:ALL'
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Téléchargement et décompression de WordPress
      unarchive:
        src: https://wordpress.org/latest.zip
        dest: /tmp
        remote_src: yes

    - name: Copie des fichiers WordPress vers /var/www/html
      copy:
        src: /tmp/wordpress/
        dest: /var/www/html/
        remote_src: yes
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Configuration de wp-config.php
      template:
        src: wp-config-sample.php
        dest: /var/www/html/wp-config.php
      # Note: Utiliser le module 'replace' ou 'template' pour les variables

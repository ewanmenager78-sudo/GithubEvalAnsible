- name: Créer la base de données WordPress
  community.mysql.mysql_db:
    name: "{{ wp_db_name }}"
    state: present
    login_user: root
    login_password: "{{ wp_root_password }}"

- name: Créer l'utilisateur MySQL pour WordPress
  community.mysql.mysql_user:
    name: "{{ wp_db_user }}"
    password: "{{ wp_db_password }}"
    priv: "{{ wp_db_name }}.*:ALL"
    state: present
    login_user: root
    login_password: "{{ wp_root_password }}"

- name: Télécharger et désarchiver WordPress
  ansible.builtin.unarchive:
    src: https://wordpress.org/latest.zip
    dest: /tmp
    remote_src: yes
    creates: /tmp/wordpress  # Idempotence : ne télécharge pas si déjà là

- name: Copier les fichiers WordPress vers le DocumentRoot
  ansible.builtin.copy:
    src: /tmp/wordpress/
    dest: "{{ wp_install_dir }}/"
    remote_src: yes
    owner: "{{ (ansible_os_family == 'Debian') | ternary(www_user_debian, www_user_redhat) }}"

- name: Configurer wp-config.php à partir du template
  ansible.builtin.template:
    src: wp-config.php.j2
    dest: "{{ wp_install_dir }}/wp-config.php"
    owner: "{{ (ansible_os_family == 'Debian') | ternary(www_user_debian, www_user_redhat) }}"
    mode: '0640'
  notify: "Relancer Apache"
